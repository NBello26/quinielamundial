<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiniela Mundial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="text-center">Quiniela Mundial - Tabla de Posiciones</h1>
    
    <table class="table table-hover mt-4">
        <thead class="table-dark">
            <tr>
                <th>Participante</th>
                <th>Puntos</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${participants}">
                <td th:text="${p.name}">Nombre</td>
                <td th:text="${p.totalPoints}">0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
